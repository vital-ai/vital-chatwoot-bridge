# Production Docker Compose configuration for ECS Fargate deployment
version: '3.8'

services:
  vital-chatwoot-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    image: vital-chatwoot-bridge:latest
    container_name: vital-chatwoot-bridge-prod
    ports:
      - "80:8000"
    environment:
      - CW_BRIDGE__app__port=8000
      - CW_BRIDGE__app__host=0.0.0.0
      - CW_BRIDGE__app__debug=false
      - CW_BRIDGE__app__environment=production
      - CW_BRIDGE__app__log_format=json
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - vital-bridge-network
    logging:
      driver: awslogs
      options:
        awslogs-group: "/ecs/vital-chatwoot-bridge"
        awslogs-region: "us-east-1"
        awslogs-stream-prefix: "ecs"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  vital-bridge-network:
    driver: bridge
